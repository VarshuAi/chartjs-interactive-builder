<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Chart Visualizer — Glassmorphism Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="glass-bg"></div>
    <div class="app-container">
        <header class="app-header">
            <div class="logo-row">
                <span class="logo-emoji">📊</span>
                <div class="title-col">
                    <h1>Data Chart Visualizer</h1>
                    <p class="tagline">UI allowing data entry to plot standard charts.</p>
                </div>
            </div>
            <div class="badge">data</div>
        </header>

        <main class="workspace-card">
            
            <div style="display:flex; gap:12px; margin-bottom:16px;">
                <input type="text" id="chart-vals" value="10, 40, 20, 80" style="width:150px;">
                <button class="btn" onclick="plotChart()">Plot Bars</button>
            </div>
            <div id="chart-container" style="height:120px; background:#0c0c14; border-radius:8px; display:flex; align-items:flex-end; padding:10px; gap:10px;"></div>
        
        </main>
        
        <footer class="app-footer">
            <p>Created as a premium portfolio piece by <a href="https://github.com/VARSHAN69" target="_blank">@VARSHAN69</a></p>
        </footer>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
